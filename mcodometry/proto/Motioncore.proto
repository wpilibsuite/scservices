syntax = "proto3";

package motioncore.proto;

option java_package = "com.motioncore.proto";

message ProtobufMotioncoreEncoder {
    int32 Position = 1;
    int32 Velocity = 2;
}

message ProtobufRawMotioncoreData {
    ProtobufMotioncoreEncoder Encoder0 = 1;
    ProtobufMotioncoreEncoder Encoder1 = 2;
    ProtobufMotioncoreEncoder Encoder2 = 3;
    uint64 Timestamp = 4;
    uint32 PinStates = 5;
}
